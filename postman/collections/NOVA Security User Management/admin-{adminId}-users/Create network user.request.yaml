$kind: http-request
description: >-
  This call creates a new network user on the network.  


  Request body should contain a `user` object which should have fields:


  <table>

  <tr>
  	<td>name</td>
  	<td>Required. Name of the network user</td>
  </tr>

  <tr>
  	<td>id</td>
  	<td>
  	Optional: if the user is already registed in one of our other systems, you may provide the id to keep the details consistent across netowrks.
  	</td>

      
  </tr>

  <tr>
      <td>email</td>
      <td>Required. Email of the user to be associated with this account.</td>
  </table>


  Response contains a `user` object with all the details related to the created
  network user.
url: "{{baseUrl}}/admin/:adminId/user/new"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  - key: adminId
    value: nisi officia anim
    description: "(Required) "
body:
  type: text
  content: |-
    {
        "user": {
            "name": "George Costanza",
            "id": "{{userId}}",
            "email": "george@vandelayindustries.com"
        }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response time is less than 800ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(800);
      });

      pm.test("Regex test ID must be at least 7 digits", function () {
          var jsonData = pm.response.json();
          console.log(jsonData.user.id);
          //matches string with 7 digits
          pm.expect(/^[0-9]{7,7}$/.test(jsonData.user.id)).to.be.true;
      });
    language: text/javascript
examples: ./.resources/Create network user.resources/examples
order: 3000

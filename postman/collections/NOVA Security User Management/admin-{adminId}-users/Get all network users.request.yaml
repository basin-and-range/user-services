$kind: http-request
description: >-
  This call fetches details about the all the network users currently registered
  in the system.


  The response will contain an array `users` object which would be a list of all
  the network users along with their details.
url: "{{baseUrl}}/admin/:adminId/users"
method: GET
headers:
  x-mock-response-name: Get all network users
pathVariables:
  - key: adminId
    value: "{{adminId}}"
    description: (Required) Id of the admin user performing the request
body:
  type: json
  content: ""
auth:
  type: apikey
  credentials:
    value: "123"
    key: abc
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });


      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(1500);
      });





      const res = pm.response.json();



      const template = `
          <style>
              .summary ul {
                  list-style-type: none;
              }
              .summary div {
                  display: inline-block;
                  width: 80%;
              }
          </style>
          <link rel="stylesheet" href="https://cdn.datatables.net/1.10.22/css/jquery.dataTables.min.css">
          <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
          <script src="https://cdn.datatables.net/1.10.22/js/jquery.dataTables.min.js"></script>
          <h1>NOVA Security API Users</h1>
          <div class="summary">
             
          <div class="table">
              <table>
                  <thead>
                      <tr>
                          <th>ID</th>
                          <th>Name</th>
                          <th>Last Login</th>
                         
                      </tr>
                  </thead>
                  <tbody>
                  {{#each res}}
                      <tr>
                          <td>{{id}}</td>
                          <td>{{name}}</td>
                          <td>{{updatedAt}}</td>
                         
                      </tr>
                  {{/each}}
                  </tbody>
              </table>
          </div>

          <script>
              $('table').DataTable()
          </script>
      `

      pm.visualizer.set(template, { res });
    language: text/javascript
examples: ./.resources/Get all network users.resources/examples
order: 2000

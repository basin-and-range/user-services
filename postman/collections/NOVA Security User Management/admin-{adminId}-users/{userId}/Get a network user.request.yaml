$kind: http-request
description: >-
  This call fetches details about the specified network user.


  The response will contain a `user` object which would contain all the details
  of the network user.
url: "{{baseUrl}}/admin/:adminId/users/:userId"
method: GET
headers:
  - key: x-mock-response-code
    value: 200 Ok
  - key: x-mock-response-name
    value: Resource does not exist
    disabled: true
  - key: x-mock-response-id
    value: 16901632-5fdd1408-3106-4360-9191-1b143280688b
    disabled: true
  - key: Content-Type
    value: application/json
pathVariables:
  - key: adminId
    value: elit cillum minim
    description: "(Required) "
  - key: userId
    value: elit cillum minim
    description: "(Required) "
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });
      // pm.environment.set("baseUrl", "name");
      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      pm.test("Schema is not empty", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.schema).to.have.length;
      });
    language: text/javascript
examples: ./.resources/Get a network user.resources/examples
order: 2000

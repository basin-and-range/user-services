$kind: http-request
description: >-
  This call updates an existing network user.  


  Request body should contain a `user` object with the fields which need to be
  updated. Only field which can be updated is `name`.


  Response contains a `user` object with all the details related to the created
  network user, namely, `id`, `name`, `email` etc.
url: "{{baseUrl}}/admin/{{adminId}}/users/{{userId}}"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: adminId
    value: sunt do nostrud
    description: "(Required) "
  - key: userId
    value: sunt do nostrud
    description: "(Required) "
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
    language: text/javascript
examples: ./.resources/Update a network user.resources/examples
order: 3000

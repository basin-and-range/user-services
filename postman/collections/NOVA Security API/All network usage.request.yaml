$kind: http-request
description: >-
  The `/network` endpoint returns a network report with statistics on user
  activity, resource management, and found security risks. 

  The response contains an array of network information containing the `name`,
  `id`, `owner` and `uid` of each network.
url: "{{baseUrl}}/network"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/All network usage.resources/examples
order: 2000

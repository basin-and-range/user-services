$kind: http-example
request:
  url: "{{baseUrl}}/admin/:adminId/user/new"
  method: POST
  pathVariables:
    - key: adminId
      value: aliquip
      description: "(Required) "
  body:
    type: json
    content: |-
      {
          "user": {
              "name": "George Costanza",
              "id": "{{userId}}",
              "email": "george@vandelayindustries.com"
          }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
       "user": {
        "name": "George Costanza",
        "id": "{{userId}}",
        "email": "george@vandelayindustries.com"
       }
      }
order: 1000

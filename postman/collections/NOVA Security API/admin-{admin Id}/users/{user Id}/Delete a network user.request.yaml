$kind: http-request
description: >-
  This call deletes an existing network user having the specified id.  


  Response contains an `user` object with `id` of the network user which was
  deleted.
url: "{{baseUrl}}/admin/:adminId/users/:userId"
method: DELETE
pathVariables:
  - key: adminId
    value: aliquip
    description: "(Required) "
  - key: userId
    value: aliquip
    description: "(Required) "
examples: ./.resources/Delete a network user.resources/examples
order: 1000

$kind: http-request
description: >-
  This call fetches details about the all the network users currently registered
  in the system.


  The response will contain an array `users` object which would be a list of all
  the network users along with their details.
url: "{{baseUrl}}/admin/:adminId/users"
method: GET
pathVariables:
  - key: adminId
    value: aliquip
    description: "(Required) "
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Get all network users.resources/examples
order: 2000

$kind: http-request
description: Send the keys that you'd like to update, this can be one or more of
  `firstName`, `lastName` and `password`.
url: "{{baseUrl}}/update?id={{id}}"
method: PUT
headers:
  Content-Type: application/x-www-form-urlencoded
  Accept: application/json; charset=utf-8
queryParams:
  - key: id
    value: "{{id}}"
    description: (Required) The user's ID (required)
body:
  type: urlencoded
  content:
    - key: firstName
      value: Benjamin
      description: (Required) The user's new first name
examples: ./.resources/Update user.resources/examples
order: 5000

$kind: http-request
description: Deletes a user from the system by `id`.
url: "{{baseUrl}}/delete?id={{id}}"
method: DELETE
headers:
  Accept: application/json; charset=utf-8
queryParams:
  - key: id
    value: "{{id}}"
    description: (Required) The user's ID
examples: ./.resources/Delete user.resources/examples
order: 6000

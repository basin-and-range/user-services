$kind: http-request
description: Creates a new user in the system. The user will be assigned an ID
  automatically. This can be found in the response.
url: "{{baseUrl}}/create"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
  Accept: application/json; charset=utf-8
body:
  type: urlencoded
  content:
    - key: firstName
      value: Kaley
      description: (Required) The user's first name (required)
    - key: lastName
      value: Klein
      description: (Required) The user's last name (required)
examples: ./.resources/New user.resources/examples
order: 3000

$kind: http-example
request:
  url: "{{baseUrl}}:/update?id={{id}}#"
  method: PUT
  headers:
    - key: Content-Type
      value: application/x-www-form-urlencoded
      description: "(Required) "
  queryParams:
    id: "{{id}}"
  body:
    type: urlencoded
    content:
      - key: firstName
        value: Benjamin
        description: (Required) The user's new first name
response:
  statusCode: 200
  statusText: OK
  headers:
    X-Powered-By: ""
    Content-Length: ""
    ETag: ""
    Date: ""
    Connection: ""
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "status": "success",
        "firstName": "Benjamin",
        "lastName": "Smith",
        "id": "0729d37c-ef9f-4ffa-8f71-a6eedf1f95b7"
      }
order: 1000

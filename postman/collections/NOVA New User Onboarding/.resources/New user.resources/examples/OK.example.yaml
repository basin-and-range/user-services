$kind: http-example
request:
  url: "{{baseUrl}}/create"
  method: POST
  headers:
    - key: Content-Type
      value: application/x-www-form-urlencoded
      description: "(Required) "
  body:
    type: urlencoded
    content:
      - key: firstName
        value: Kaley
        description: (Required) The user's first name (required)
      - key: lastName
        value: Klein
        description: (Required) The user's last name (required)
response:
  statusCode: 200
  statusText: OK
  headers:
    X-Powered-By: ""
    Content-Length: ""
    ETag: ""
    Date: ""
    Connection: ""
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "status": "success",
        "firstName": "Ben",
        "lastName": "Smith",
        "id": "0729d37c-ef9f-4ffa-8f71-a6eedf1f95b7"
      }
order: 1000
